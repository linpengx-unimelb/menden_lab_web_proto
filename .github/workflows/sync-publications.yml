name: Sync Publications

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync publications
        run: npm run sync:publications

      - name: Build site
        run: npm run build

      - name: Commit updated publications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/publications.ts
          if git diff --cached --quiet; then
            echo "No publication updates found."
            exit 0
          fi
          git commit -m "chore: sync publications"
          git push
